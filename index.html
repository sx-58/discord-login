<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Boas-vindas de volta!</title>
    <link href="https://fonts.googleapis.com/css2?family=Whitney:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.78,56.63.48,80.1a105.73,105.73,0,0,0,32.22,16.26,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.24-16.27C130.41,52,121.15,28.24,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.07,65.69,84.69,65.69Z"/>
            </svg>
            <span class="logo-text">Discord</span>
        </div>
        
        <h1>Boas-vindas de volta!</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail ou número de telefone <span class="required">*</span></label>
                <input type="text" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <input type="password" id="password" required>
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
            </div>
            
            <button type="submit" class="login-button" id="btnEntrar">Entrar</button>
            
            <p class="register-text">
                Precisando de uma conta? <a href="#" class="register-link">Registre-se</a>
            </p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
